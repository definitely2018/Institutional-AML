name: fiad

channels:
  - pytorch
  - nvidia
  - conda-forge

dependencies:
  - python=3.10
  - pip
  - pytorch=2.0.1
  - pytorch-cuda=11.8
  - numpy=1.24.3
  - pandas=2.3.3
  - scipy=1.15.3
  - scikit-learn=1.7.2
  - matplotlib=3.10.8
  - tqdm=4.67.3
  - tensorboard
  - pip:
      - --find-links https://data.pyg.org/whl/torch-2.0.1+cu118.html
      - torch-geometric==2.7.0
      - torch-scatter==2.1.2
      - torch-sparse==0.6.18
      - torch-cluster==1.6.3
      - ogb==1.3.6
      - deeprobust==0.2.11

